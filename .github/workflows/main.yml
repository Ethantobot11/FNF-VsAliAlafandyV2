name: Main
on: workflow_dispatch

# permissions: write-all

jobs:
  Build:
    name: ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - name: Html5
            os: ubuntu-22.04
            buildArgs: html5
            artifactName: HTML5
            artifactPath: export/release/html5/bin/*
    uses: ./.github/workflows/build.yml
    with:
        name: ${{ matrix.name }}
        os: ${{ matrix.os }}
        buildArgs: ${{ matrix.buildArgs }}
        artifactName: ${{ matrix.artifactName }}
        artifactPath: ${{ matrix.artifactPath }}
